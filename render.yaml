services:
  - type: web
    name: moneytalks
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_FINNHUB_API_KEY
        sync: false
      - key: VITE_POLYGON_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_ADMIN_EMAILS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
